<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style id="app-css">
        :root {
            color-scheme: light dark;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans", Helvetica, Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji";
            font-size: 16px;
            line-height: 1.5;
            word-wrap: break-word;
            overflow-wrap: break-word;
            max-width: 100%;
            margin: 0;
            padding: 16px 32px;
            color: #1f2328;
            background: #ffffff;
            transition: color 0.15s, background 0.15s;
            box-sizing: border-box;
        }

        /* Dark mode */
        @media (prefers-color-scheme: dark) {
            body { color: #e6edf3; background: #0d1117; }
            a { color: #58a6ff; }
            code:not([class*="language-"]) { background: #343942; color: #e6edf3; }
            pre { background: #161b22 !important; color: #e6edf3; }
            th, td { border-color: #3d444d; color: #e6edf3; }
            tr { background-color: #0d1117; border-top-color: #3d444db3; }
            tr:nth-child(2n) { background-color: #151b23; }
            blockquote { border-left-color: #3d444d; color: #8b949e; }
            hr { border-top-color: #3d444d; }
            h1, h2, h3, h4, h5 { color: #e6edf3; }
            h1, h2 { border-bottom-color: #3d444d; }
            h6 { color: #8b949e; }
            .token.comment, .token.prolog, .token.doctype, .token.cdata { color: #8b949e; }
            .token.punctuation { color: #e6edf3; }
            .token.property, .token.tag, .token.boolean, .token.number, .token.constant, .token.symbol, .token.deleted { color: #79c0ff; }
            .token.selector, .token.attr-name, .token.string, .token.char, .token.builtin, .token.inserted { color: #a5d6ff; }
            .token.operator, .token.entity, .token.url { color: #e6edf3; }
            .token.atrule, .token.attr-value, .token.keyword { color: #ff7b72; }
            .token.function, .token.class-name { color: #d2a8ff; }
            .token.regex, .token.important, .token.variable { color: #ffa657; }
            :focus-visible { outline-color: #58a6ff; }
        }

        /* Headings */
        h1, h2, h3, h4, h5, h6 { margin-top: 24px; margin-bottom: 16px; font-weight: 600; line-height: 1.25; }
        h1 { font-size: 2em; padding-bottom: 0.3em; border-bottom: 1px solid #d0d7de; }
        h2 { font-size: 1.5em; padding-bottom: 0.3em; border-bottom: 1px solid #d0d7de; }
        h3 { font-size: 1.25em; }
        h4 { font-size: 1em; }
        h5 { font-size: 0.875em; }
        h6 { font-size: 0.85em; color: #656d76; }

        /* Paragraphs and inline */
        p { margin-top: 0; margin-bottom: 16px; }
        a { color: #0969da; text-decoration: none; }
        a:hover { text-decoration: underline; }
        strong { font-weight: 600; }

        /* Code */
        code:not([class*="language-"]) {
            background: #eff1f3;
            padding: 0.2em 0.4em;
            border-radius: 6px;
            font-size: 85%;
        }
        code {
            font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, "Liberation Mono", monospace;
        }
        pre {
            background: #f6f8fa;
            padding: 16px;
            border-radius: 6px;
            overflow-x: auto;
            font-size: 85%;
            line-height: 1.45;
            margin-bottom: 16px;
        }
        pre code {
            background: none !important;
            padding: 0;
            border-radius: 0;
            font-size: 100%;
            display: block;
        }

        /* Tables — matches GitHub Primer */
        /* overflow-x is on .table-wrapper (injected by JS below), not the table itself,
           so wide tables scroll horizontally without clipping at the viewport edge */
        .table-wrapper { overflow-x: auto; margin-bottom: 16px; -webkit-overflow-scrolling: touch; }
        table { border-spacing: 0; border-collapse: collapse; display: table; width: max-content; min-width: 100%; font-variant: tabular-nums; margin-bottom: 0; }
        th, td { padding: 6px 13px; border: 1px solid #d1d9e0; }
        th { font-weight: 600; }
        tr { background-color: #ffffff; border-top: 1px solid #d1d9e0b3; }
        tr:nth-child(2n) { background-color: #f6f8fa; }

        /* Blockquotes */
        blockquote { border-left: 4px solid #d0d7de; margin: 0 0 16px 0; padding: 0 16px; color: #656d76; }

        /* Lists */
        ul, ol { padding-left: 2em; margin-top: 0; margin-bottom: 16px; }
        li + li { margin-top: 0.25em; }
        li > p { margin-top: 16px; }

        /* Task lists */
        ul.contains-task-list { list-style: none; padding-left: 0; }
        .task-list-item { list-style: none; }
        input[type="checkbox"] { margin-right: 0.5em; vertical-align: middle; }

        /* Horizontal rules */
        hr { border: none; border-top: 1px solid #d0d7de; margin: 24px 0; }

        /* Images */
        img { max-width: 100%; height: auto; }

        /* Details */
        details { margin-bottom: 16px; }
        details summary { cursor: pointer; font-weight: 600; }

        /* Footnotes */
        .footnotes { font-size: 0.875em; border-top: 1px solid #d0d7de; margin-top: 24px; padding-top: 16px; }

        /* Focus indicators */
        :focus-visible { outline: 2px solid #0969da; outline-offset: 2px; }
        a:focus-visible { outline: 2px solid currentColor; outline-offset: 2px; }

        /* RTL support */
        [dir="rtl"] { text-align: right; }
        [dir="rtl"] blockquote { border-left: none; border-right: 4px solid #d0d7de; padding: 0 16px 0 0; }
        [dir="rtl"] ul, [dir="rtl"] ol { padding-left: 0; padding-right: 2em; }

        /* Mermaid diagrams */
        .mermaid { text-align: center; margin-bottom: 16px; overflow-x: auto; }
        /* width/height attrs removed by JS post-processing so viewBox scales with zoom */
        .mermaid svg { width: 100%; max-width: 100%; height: auto; display: block; margin: 0 auto; }

        /* GFM Alert callouts ([!NOTE], [!WARNING], etc.) */
        .alert { border-radius: 6px; padding: 12px 16px; margin-bottom: 16px; border: 1px solid; }
        .alert p { margin: 0; }
        .alert-title { font-weight: 600; margin-bottom: 6px !important; display: flex; align-items: center; gap: 6px; }
        .alert-note      { background: #ddf4ff; border-color: #54aeff; color: #0550ae; }
        .alert-tip       { background: #dafbe1; border-color: #4ac26b; color: #116329; }
        .alert-important { background: #fbefff; border-color: #c297ff; color: #6e40c9; }
        .alert-warning   { background: #fff8c5; border-color: #d4a72c; color: #7d4e00; }
        .alert-caution   { background: #ffebe9; border-color: #ff8182; color: #a40e26; }
        @media (prefers-color-scheme: dark) {
            .alert-note      { background: #0d2d6b; border-color: #1f6feb; color: #cae8ff; }
            .alert-tip       { background: #062d0f; border-color: #238636; color: #aff5b4; }
            .alert-important { background: #21003d; border-color: #8957e5; color: #d2a8ff; }
            .alert-warning   { background: #2d1e00; border-color: #9e6a03; color: #e3b341; }
            .alert-caution   { background: #300b0b; border-color: #da3633; color: #ffa198; }
        }

        /* TOC sidebar */
        #toc-sidebar {
            position: fixed; top: 0; right: 0; width: 220px; height: 100vh;
            overflow-y: auto; padding: 20px 14px;
            font-size: 12.5px; line-height: 1.5;
            background: rgba(255,255,255,0.92); backdrop-filter: blur(8px);
            border-left: 1px solid #d0d7de;
            box-sizing: border-box; z-index: 100;
            transition: opacity 0.2s;
        }
        #toc-sidebar.hidden { display: none; }
        #toc-sidebar ul { list-style: none; margin: 0; padding: 0; }
        #toc-sidebar li { margin: 0; }
        #toc-sidebar a {
            display: block; padding: 2px 0 2px 0;
            color: #57606a; text-decoration: none;
            overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
        }
        #toc-sidebar a:hover { color: #0969da; }
        #toc-sidebar a.active { color: #0969da; font-weight: 600; }
        #toc-sidebar .toc-h1 { padding-left: 0; }
        #toc-sidebar .toc-h2 { padding-left: 10px; }
        #toc-sidebar .toc-h3 { padding-left: 20px; font-size: 12px; }
        #toc-sidebar .toc-h4 { padding-left: 30px; font-size: 11.5px; color: #8c959f; }
        #toc-sidebar .toc-title {
            font-size: 11px; font-weight: 600; text-transform: uppercase;
            letter-spacing: 0.06em; color: #8c959f; margin-bottom: 8px;
        }
        body.has-toc { padding-right: 240px; }
        @media (prefers-color-scheme: dark) {
            #toc-sidebar {
                background: rgba(13,17,23,0.92);
                border-left-color: #3d444d;
            }
            #toc-sidebar a { color: #8b949e; }
            #toc-sidebar a:hover, #toc-sidebar a.active { color: #58a6ff; }
            #toc-sidebar .toc-h4 { color: #6e7681; }
            #toc-sidebar .toc-title { color: #6e7681; }
        }

        /* Print */
        @media print {
            body { max-width: none; padding: 0; }
            pre { white-space: pre-wrap; }
            #toc-sidebar { display: none; }
        }
    </style>
</head>
<body>
    <article id="content" role="document" aria-label="Rendered markdown content">
        {{CONTENT}}
    </article>
    <script>
        // Wrap tables in scrollable containers so wide tables scroll horizontally
        // instead of clipping at the viewport edge (GitHub Primer pattern)
        document.querySelectorAll('article table').forEach(function(table) {
            if (table.parentElement.classList.contains('table-wrapper')) return;
            var wrapper = document.createElement('div');
            wrapper.className = 'table-wrapper';
            table.parentNode.insertBefore(wrapper, table);
            wrapper.appendChild(table);
        });
        // Transform GFM alert callouts: blockquotes starting with [!TYPE]
        // Handles two forms cmark-gfm produces:
        //   (a) [!NOTE] alone → <p>[!NOTE]</p> + sibling <p>content</p>  (blank line in source)
        //   (b) [!NOTE]\nContent → <p>[!NOTE]\nContent</p>               (GitHub standard, no blank line)
        (function() {
            var icons   = {note:'ℹ️', tip:'💡', important:'❗', warning:'⚠️', caution:'🔴'};
            var labels  = {note:'Note', tip:'Tip', important:'Important', warning:'Warning', caution:'Caution'};
            document.querySelectorAll('article blockquote').forEach(function(bq) {
                var firstP = bq.querySelector('p');
                if (!firstP) return;
                // Match [!TYPE] at the START of the paragraph (not requiring it to be the whole text)
                var m = firstP.textContent.trim().match(/^\[!(NOTE|TIP|IMPORTANT|WARNING|CAUTION)\]/i);
                if (!m) return;
                var type = m[1].toLowerCase();
                bq.className = 'alert alert-' + type;
                // Strip the [!TYPE] marker + any trailing whitespace/newline from innerHTML
                // to recover the inline content (handles bold, code, links inside the alert)
                var stripped = firstP.innerHTML
                    .replace(/^\s*\[!(NOTE|TIP|IMPORTANT|WARNING|CAUTION)\]\s*/i, '')
                    .trim();
                // Set the title line
                firstP.innerHTML = '<strong>' + icons[type] + ' ' + labels[type] + '</strong>';
                firstP.className = 'alert-title';
                // If content was inline with the marker (form b), inject it after the title
                if (stripped) {
                    var contentEl = document.createElement('p');
                    contentEl.innerHTML = stripped;
                    firstP.after(contentEl);
                }
                // Form (a): sibling paragraphs already exist — no action needed
            });
        })();
        // Inline Prism.js will be loaded here by the app

        // TOC sidebar: build from headings, highlight on scroll
        (function() {
            var headings = Array.from(document.querySelectorAll('article h1,article h2,article h3,article h4'));
            if (headings.length < 3) return; // don't show TOC for short docs

            // Assign IDs
            var slugCounts = {};
            headings.forEach(function(h) {
                if (!h.id) {
                    var slug = h.textContent.toLowerCase()
                        .replace(/[^\w\s-]/g, '').replace(/\s+/g, '-').replace(/-+/g, '-').replace(/^-|-$/g, '');
                    slugCounts[slug] = (slugCounts[slug] || 0) + 1;
                    h.id = slugCounts[slug] > 1 ? slug + '-' + (slugCounts[slug] - 1) : slug;
                }
            });

            // Build sidebar
            var sidebar = document.createElement('nav');
            sidebar.id = 'toc-sidebar';
            sidebar.setAttribute('aria-label', 'Table of contents');
            var title = document.createElement('div');
            title.className = 'toc-title';
            title.textContent = 'Contents';
            sidebar.appendChild(title);
            var ul = document.createElement('ul');
            var links = [];
            headings.forEach(function(h) {
                var level = parseInt(h.tagName[1]);
                var li = document.createElement('li');
                var a = document.createElement('a');
                a.href = '#' + h.id;
                a.textContent = h.textContent;
                a.className = 'toc-h' + level;
                a.addEventListener('click', function(e) {
                    e.preventDefault();
                    h.scrollIntoView({behavior: 'smooth', block: 'start'});
                });
                li.appendChild(a);
                ul.appendChild(li);
                links.push({el: h, a: a});
            });
            sidebar.appendChild(ul);
            document.body.appendChild(sidebar);
            document.body.classList.add('has-toc');

            // Highlight active section on scroll
            var ticking = false;
            function updateActive() {
                var scrollY = window.scrollY + 80;
                var active = links[0];
                for (var i = 0; i < links.length; i++) {
                    if (links[i].el.offsetTop <= scrollY) active = links[i];
                    else break;
                }
                links.forEach(function(l) { l.a.classList.remove('active'); });
                if (active) active.a.classList.add('active');
                ticking = false;
            }
            window.addEventListener('scroll', function() {
                if (!ticking) { requestAnimationFrame(updateActive); ticking = true; }
            }, {passive: true});
            updateActive();
        })();
    </script>
</body>
</html>
