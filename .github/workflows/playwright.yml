name: Playwright Tests

on:
  push:
    branches: [main]
    paths:
      - "Sources/MarkViewCore/**"
      - "Tests/playwright/**"
      - "Tests/TestRunner/Fixtures/**"
  pull_request:
    branches: [main]

jobs:
  playwright:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: Tests/playwright/package.json

      - name: Install dependencies
        working-directory: Tests/playwright
        run: npm ci

      - name: Install Playwright browsers
        working-directory: Tests/playwright
        run: npx playwright install chromium --with-deps

      - name: Check fixtures are committed
        run: |
          if [[ ! -f "Tests/playwright/fixtures/golden-corpus.html" ]]; then
            echo "ERROR: Playwright fixtures missing. Run: bash scripts/gen-playwright-fixtures.sh"
            echo "Fixtures must be committed to Tests/playwright/fixtures/"
            exit 1
          fi
          echo "Fixtures present: $(ls Tests/playwright/fixtures/*.html | wc -l | tr -d ' ') files"

      - name: Run Playwright tests
        working-directory: Tests/playwright
        run: npx playwright test
        env:
          CI: true

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: Tests/playwright/playwright-report/
          retention-days: 7
