name: Repo Guard
on: [push, pull_request]

jobs:
  check-private-files:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Ensure no private config files are committed
        run: |
          # CLAUDE.md is intentional in this repo (project AI dev guide — not private LOOP infra).
          # Block .claude/ directory contents and scripts/claude-* only.
          blocked=$(git ls-tree -r --name-only HEAD | grep -E '^\.(claude)/|^hooks/|^scripts/claude-' || true)
          if [ -n "$blocked" ]; then
            echo "::error::Private configuration files detected in repo:"
            echo "$blocked"
            exit 1
          fi

  check-version-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history needed for git tag checks
      - name: Version strings in sync (plist ↔ git tag ↔ QL ↔ MCP)
        run: bash scripts/check-version-sync.sh
