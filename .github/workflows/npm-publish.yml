name: Publish npm

# Lightweight npm-only publish — skips Swift build/notarize.
# Use when only npm/ changes (JS module, package.json) and no new app binary is needed.
# The postinstall continues to download the existing binary from the latest GitHub Release.
#
# Triggers: workflow_dispatch (manual), automatic when npm/ changes on main, and
# workflow_run after a successful Release — a coordinated app+npm release fires the
# push trigger before release.yml has uploaded the binary artifacts, so the publish
# gate fails that first run and this retry completes the publish (idempotent via
# the already-published check).
#
# Auth: npm Trusted Publishing (OIDC) — configured on the package's npm Settings for
# this repo + this workflow filename. No NPM_TOKEN to expire (the 1.6.0 release was
# blocked by exactly that). Requires npm >= 11.5.1 and id-token: write.
# The MCP registry publish (mcp-publisher, github-oidc login) rides the same OIDC
# grant — it went stale at 1.2.11 (Apr 3) because it was a manual step nobody ran.

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (pack + verify, skip publish)'
        required: false
        default: 'false'
  push:
    branches:
      - main
    paths:
      - 'npm/package.json'
      - 'npm/index.js'
      - 'npm/scripts/**'
      - 'npm/bin/**'
  workflow_run:
    workflows: [Release]
    types: [completed]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  publish:
    runs-on: macos-latest
    timeout-minutes: 20
    # workflow_run retries only make sense after a SUCCESSFUL release.
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    permissions:
      contents: read
      id-token: write   # npm Trusted Publishing + mcp-publisher github-oidc

    steps:
      - uses: actions/checkout@v4

      - name: Ensure npm >= 11.5.1 (trusted publishing minimum)
        run: |
          npm install -g npm@11
          npm --version

      - name: Get npm version
        id: version
        run: |
          VERSION=$(node -p "require('./npm/package.json').version")
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Publishing mcp-server-markview@$VERSION"

      - name: Check if already published
        id: check
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          PUBLISHED=$(npm view "mcp-server-markview@${VERSION}" version 2>/dev/null || echo "")
          if [[ "$PUBLISHED" == "$VERSION" ]]; then
            echo "SKIP=true" >> $GITHUB_OUTPUT
            echo "mcp-server-markview@${VERSION} already published — nothing to do"
          else
            echo "SKIP=false" >> $GITHUB_OUTPUT
            echo "mcp-server-markview@${VERSION} not yet published — proceeding"
          fi

      - name: Gate — BINARY_VERSION current and its release asset downloadable
        # npm publishes are immutable. Blocks the 1.6.0 incident class:
        # a stale postinstall pin (old binary under a new package version)
        # or a pin whose GitHub release / tar.gz asset does not exist yet.
        if: steps.check.outputs.SKIP == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: python3 scripts/npm_publish_gate.py

      - name: Install npm dependencies
        if: steps.check.outputs.SKIP == 'false'
        run: cd npm && npm install

      - name: Verify createSandboxServer is importable
        if: steps.check.outputs.SKIP == 'false'
        run: |
          cd npm
          node -e "
            const { createSandboxServer } = require('.');
            if (typeof createSandboxServer !== 'function') {
              console.error('ERROR: createSandboxServer is not a function');
              process.exit(1);
            }
            const server = createSandboxServer();
            if (!server) {
              console.error('ERROR: createSandboxServer() returned null');
              process.exit(1);
            }
            console.log('✓ createSandboxServer() works — Smithery capability scanning will succeed');
          "

      - name: Pack and verify postinstall
        if: steps.check.outputs.SKIP == 'false'
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          cd npm
          PACK_FILE=$(npm pack --pack-destination /tmp 2>/dev/null | tail -1)
          echo "Packed: $PACK_FILE"

          _tmp=$(mktemp -d)
          cd "$_tmp"
          # Install from local pack — same code path as real npm install
          npm install "/tmp/${PACK_FILE}" 2>&1 | tail -5

          # Verify index.js is present and importable from the pack
          node -e "
            const pkg = require('./node_modules/mcp-server-markview');
            if (typeof pkg.createSandboxServer !== 'function') {
              console.error('ERROR: createSandboxServer not exported from packed module');
              process.exit(1);
            }
            console.log('✓ Packed module exports createSandboxServer correctly');
          "

          # Verify binary was downloaded (macOS postinstall)
          if [[ -f "$_tmp/node_modules/mcp-server-markview/bin/markview-mcp-server-binary" ]]; then
            SIZE=$(du -sh "$_tmp/node_modules/mcp-server-markview/bin/markview-mcp-server-binary" | cut -f1)
            echo "✓ Postinstall: binary downloaded (${SIZE})"
          else
            echo "⚠ Binary not found — postinstall may have failed (non-blocking)"
          fi
          rm -rf "$_tmp"

      - name: Publish to npm (OIDC trusted publishing)
        if: steps.check.outputs.SKIP == 'false' && github.event.inputs.dry_run != 'true'
        run: |
          cd npm
          # No token: npm mints a short-lived credential via the workflow's OIDC
          # identity (trusted publisher must match repo + workflow filename).
          npm publish --access public
          echo "✓ Published mcp-server-markview@${{ steps.version.outputs.VERSION }}"

      - name: Publish to MCP registry
        if: steps.check.outputs.SKIP == 'false' && github.event.inputs.dry_run != 'true'
        run: |
          brew install mcp-publisher
          cd npm
          mcp-publisher login github-oidc
          mcp-publisher publish
          echo "✓ MCP registry updated for io.github.paulhkang94/markview"

      - name: Dry run summary
        if: github.event.inputs.dry_run == 'true'
        run: echo "Dry run complete — skipped publish. Set dry_run=false to publish."
