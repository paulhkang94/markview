name: Stale Release Check

# Runs weekly and opens a GitHub issue when there are Ōēź10 commits since the
# last release tag ŌĆö a signal that features have accumulated and a release is due.
# Also runs on-demand for manual checks.

on:
  schedule:
    - cron: '0 10 * * 1'   # every Monday at 10am UTC
  workflow_dispatch:

jobs:
  check:
    name: Check for stale release
    runs-on: ubuntu-latest
    continue-on-error: true   # advisory only ŌĆö never blocks main
    permissions:
      issues: write
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history required to count commits since tag

      - name: Count commits and open issue if stale
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$LAST_TAG" ]; then
            echo "No tags found ŌĆö skipping"
            exit 0
          fi
          COUNT=$(git rev-list "${LAST_TAG}..HEAD" --count)
          VERSION=$(grep -A1 "BundleShortVersionString" Sources/MarkView/Info.plist | tail -1 | sed 's/.*<string>\(.*\)<\/string>.*/\1/')
          echo "Last tag: $LAST_TAG | Commits since: $COUNT | Info.plist: $VERSION"
          if [ "$COUNT" -lt 10 ]; then
            echo "Only $COUNT commits since $LAST_TAG ŌĆö not stale yet"
            exit 0
          fi
          TITLE="Release due: $COUNT commits since $LAST_TAG"
          # Check for existing open issue to avoid duplicates
          EXISTING=$(gh issue list --repo "$GITHUB_REPOSITORY" --label release --state open --json title --jq '.[0].title' 2>/dev/null || echo "")
          if [ -n "$EXISTING" ]; then
            echo "Issue already open: $EXISTING ŌĆö skipping"
            exit 0
          fi
          LOG=$(git log "${LAST_TAG}..HEAD" --oneline | head -20)
          # Write body to tmpfile ŌĆö avoids YAML backtick-escaping issues
          BODY_FILE=$(mktemp)
          printf '## %s commits since `%s`\n\n' "$COUNT" "$LAST_TAG" > "$BODY_FILE"
          printf 'Time to cut a new release. Current `Info.plist` version: `%s`\n\n' "$VERSION" >> "$BODY_FILE"
          printf '### Recent commits\n```\n%s\n```\n\n' "$LOG" >> "$BODY_FILE"
          printf '### How to release\n```bash\nbash scripts/release.sh --bump minor --ship\n```\n\n' >> "$BODY_FILE"
          printf 'Or trigger from GitHub Actions ŌåÆ Release ŌåÆ Run workflow.\n\n' >> "$BODY_FILE"
          printf '*Auto-opened by the stale-release check workflow.*\n' >> "$BODY_FILE"
          gh issue create \
            --repo "$GITHUB_REPOSITORY" \
            --title "$TITLE" \
            --label release \
            --body-file "$BODY_FILE" || echo "Note: could not create issue (label may not exist)"
          rm -f "$BODY_FILE"
          echo "Opened issue: $TITLE"
