name: Release

# Triggers when a vX.Y.Z tag is pushed — auto-builds, notarizes, and
# publishes a GitHub Release with the .zip artifact.
#
# Required secrets (set in repo Settings → Secrets):
#   APPLE_ID              — Apple ID email for notarization
#   NOTARIZE_KEY_ID       — App Store Connect API key ID
#   NOTARIZE_ISSUER_ID    — App Store Connect issuer ID
#   NOTARIZE_API_KEY      — Base64-encoded .p8 key file content
#
# The release.sh script handles signing + notarization on macOS runners.
# GitHub-hosted macOS runners have Xcode pre-installed.

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

jobs:
  release:
    runs-on: macos-latest
    timeout-minutes: 120
    permissions:
      contents: write   # required to create GitHub Releases and upload assets

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Cache SPM dependencies
        uses: actions/cache@v4
        with:
          path: .build
          key: ${{ runner.os }}-spm-${{ hashFiles('Package.resolved') }}
          restore-keys: ${{ runner.os }}-spm-

      - name: Clear stale SPM binary artifact cache
        run: rm -rf ~/Library/Caches/org.swift.swiftpm/artifacts/

      - name: Import signing certificate
        env:
          CERTIFICATE_BASE64: ${{ secrets.DEVELOPER_ID_CERT_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.DEVELOPER_ID_CERT_PASSWORD }}
          KEYCHAIN_PASSWORD: markview-ci
        run: |
          # Create a temporary keychain for the CI signing cert
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          echo "$CERTIFICATE_BASE64" | base64 --decode > /tmp/cert.p12
          security import /tmp/cert.p12 -k build.keychain -P "$CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" build.keychain
          rm /tmp/cert.p12

      - name: Store notarization credentials
        env:
          NOTARIZE_KEY_ID: ${{ secrets.NOTARIZE_KEY_ID }}
          NOTARIZE_ISSUER_ID: ${{ secrets.NOTARIZE_ISSUER_ID }}
          NOTARIZE_API_KEY: ${{ secrets.NOTARIZE_API_KEY }}
        run: |
          mkdir -p ~/.private_keys
          echo "$NOTARIZE_API_KEY" | base64 --decode > ~/.private_keys/AuthKey_${NOTARIZE_KEY_ID}.p8
          # Store in keychain so xcrun notarytool can find them
          xcrun notarytool store-credentials "notarytool-profile" \
            --key ~/.private_keys/AuthKey_${NOTARIZE_KEY_ID}.p8 \
            --key-id "$NOTARIZE_KEY_ID" \
            --issuer "$NOTARIZE_ISSUER_ID"

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Run tests
        run: swift run MarkViewTestRunner

      - name: Build, sign, notarize
        run: bash scripts/bundle.sh --notarize
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
          NOTARIZE_KEY_ID: ${{ secrets.NOTARIZE_KEY_ID }}
          NOTARIZE_ISSUER_ID: ${{ secrets.NOTARIZE_ISSUER_ID }}

      - name: Create release artifacts (zip + tar.gz for npm)
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"

          # zip: full app bundle for direct download / Homebrew
          # Use ditto (not zip) — ditto preserves the notarization staple ticket
          # stored in the resource fork / extended attributes. Plain `zip` strips it.
          # ditto also creates a relative path inside the zip (MarkView.app/),
          # whereas `zip /abs/path/MarkView.app` embeds the full runner path.
          ditto -c -k --keepParent \
            "${{ github.workspace }}/MarkView.app" \
            "/tmp/MarkView-${VERSION}.zip"
          echo "ARTIFACT=/tmp/MarkView-${VERSION}.zip" >> $GITHUB_ENV

          # Sanity check: first entry in zip must be MarkView.app/, not a runner path
          first_entry=$(unzip -l "/tmp/MarkView-${VERSION}.zip" | awk 'NR==4{print $4}')
          if [[ "$first_entry" != "MarkView.app/" ]]; then
            echo "ERROR: zip internal path is '$first_entry' (expected 'MarkView.app/')"
            echo "The zip will produce a nested folder structure, not a drag-and-drop app."
            exit 1
          fi
          echo "✓ Zip structure verified: first entry = $first_entry"

          # tar.gz: MCP server binary only — consumed by npm postinstall.js
          # Structure: ./MarkView.app/Contents/MacOS/markview-mcp-server
          _tmp_pkg="$(mktemp -d)"
          mkdir -p "${_tmp_pkg}/MarkView.app/Contents/MacOS"
          cp "${{ github.workspace }}/MarkView.app/Contents/MacOS/markview-mcp-server" \
             "${_tmp_pkg}/MarkView.app/Contents/MacOS/"
          tar -czf "/tmp/MarkView-${VERSION}.tar.gz" -C "${_tmp_pkg}" .
          rm -rf "${_tmp_pkg}"
          echo "NPM_TARBALL=/tmp/MarkView-${VERSION}.tar.gz" >> $GITHUB_ENV

      - name: Gatekeeper pre-publish check (extract zip → quarantine → spctl)
        # Test the artifact BEFORE it goes public. If this fails, nothing ships.
        # Tests: zip path structure, notarization staple ticket, spctl --assess.
        # The zip is on disk at $ARTIFACT — no need to download from a live URL.
        run: |
          _gk_tmp="$(mktemp -d)"
          unzip -qq "$ARTIFACT" -d "$_gk_tmp"
          _extracted="${_gk_tmp}/MarkView.app"

          # Verify zip structure — must extract to MarkView.app at root
          if [ ! -d "$_extracted" ]; then
            echo "ERROR: MarkView.app not at root of extracted zip"
            ls "$_gk_tmp"
            exit 1
          fi
          echo "✓ Zip extracts to MarkView.app/ at root"

          # Apply quarantine (simulates what macOS adds to any download)
          xattr -w com.apple.quarantine \
            "0081;$(printf '%08x' $(date +%s));curl;test" \
            "$_extracted" 2>/dev/null || true

          # Gatekeeper — the exact check users fail if notarization is broken
          if spctl --assess --type execute "$_extracted" 2>/dev/null; then
            echo "✓ Gatekeeper ACCEPTS the artifact"
          else
            REASON=$(spctl --assess --type execute --verbose=4 "$_extracted" 2>&1 | grep -oE 'source=.*' | head -1 || echo "unknown")
            echo "ERROR: Gatekeeper REJECTS the artifact (${REASON})"
            echo "Users would see 'MarkView is damaged and can't be opened'"
            echo "Fix before publishing — do NOT proceed with release."
            rm -rf "$_gk_tmp"
            exit 1
          fi

          # Staple ticket — required for offline Gatekeeper pass
          if xcrun stapler validate "$_extracted" 2>/dev/null | grep -q "The validate action worked"; then
            echo "✓ Notarization staple ticket present"
          else
            echo "ERROR: Notarization staple ticket MISSING"
            echo "Offline users (strict Gatekeeper policy) will see 'damaged'."
            rm -rf "$_gk_tmp"
            exit 1
          fi

          rm -rf "$_gk_tmp"
          echo "✓ Artifact verified — safe to publish"

      - name: Generate release notes
        id: notes
        run: |
          # Auto-generate from git log since last tag
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD~1 2>/dev/null || echo "")
          if [[ -n "$PREV_TAG" ]]; then
            NOTES=$(git log --oneline "${PREV_TAG}..HEAD" | grep -v "^[a-f0-9]* chore\|^[a-f0-9]* docs\|^[a-f0-9]* Release" | head -20 | sed 's/^[a-f0-9]* /- /')
          else
            NOTES="Initial release"
          fi
          echo "NOTES<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: MarkView ${{ github.ref_name }}
          body: |
            ${{ steps.notes.outputs.NOTES }}

            **Installation**: Download `MarkView-${{ steps.version.outputs.VERSION }}.zip`, extract, move to `/Applications`.
          files: |
            ${{ env.ARTIFACT }}
            ${{ env.NPM_TARBALL }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish npm package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          echo "//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}" > ~/.npmrc
          cd npm
          VERSION="${{ steps.version.outputs.VERSION }}"
          # Check if this version is already published (local release.sh may have run first)
          PUBLISHED=$(npm view "mcp-server-markview@${VERSION}" version 2>/dev/null || echo "")
          if [[ "$PUBLISHED" == "$VERSION" ]]; then
            echo "mcp-server-markview@${VERSION} already published — skipping"
          else
            npm publish --access public
            echo "Published mcp-server-markview@${VERSION} to npm"
          fi

      - name: Verify npm postinstall works
        # Install the just-published package in a temp dir and confirm the binary downloads.
        # Catches: wrong tarball URL, broken postinstall.js, missing GitHub Release asset.
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          _tmp=$(mktemp -d)
          cd "$_tmp"
          # Retry up to 6 times — npm registry propagation can take 30–60s
          for i in 1 2 3 4 5 6; do
            npm install "mcp-server-markview@${VERSION}" --prefer-offline=false 2>&1 | tail -5 && break
            echo "Attempt $i failed, retrying in 15s..."
            sleep 15
          done
          if [[ -f "$_tmp/node_modules/mcp-server-markview/bin/markview-mcp-server-binary" ]]; then
            SIZE=$(du -sh "$_tmp/node_modules/mcp-server-markview/bin/markview-mcp-server-binary" | cut -f1)
            echo "✓ npm postinstall: binary downloaded and extracted (${SIZE})"
          else
            echo "ERROR: npm postinstall did not produce bin/markview-mcp-server-binary"
            echo "Users running: npx mcp-server-markview will get a broken install"
            ls "$_tmp/node_modules/mcp-server-markview/" 2>/dev/null || true
            exit 1
          fi
          rm -rf "$_tmp"

      - name: Update Homebrew tap
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          # Only update tap if HOMEBREW_TAP_TOKEN is set
          if [[ -z "$GH_TOKEN" ]]; then
            echo "HOMEBREW_TAP_TOKEN not set — skipping tap update"
            exit 0
          fi
          # Compute SHA256 of the release zip
          SHA256=$(shasum -a 256 "$ARTIFACT" | awk '{print $1}')
          VERSION="${{ steps.version.outputs.VERSION }}"
          # Clone the tap, update the cask, push
          git clone "https://x-access-token:${GH_TOKEN}@github.com/paulhkang94/homebrew-markview.git" /tmp/tap
          cd /tmp/tap
          sed -i '' \
            -e "s/version \".*\"/version \"${VERSION}\"/" \
            -e "s/sha256 \".*\"/sha256 \"${SHA256}\"/" \
            Casks/markview.rb
          git config user.email "contact@paulkang.dev"
          git config user.name "Paul Kang"
          git add Casks/markview.rb
          git commit -m "Update MarkView to ${VERSION}" || echo "No changes to tap"
          git push

      - name: Verify Homebrew tap updated correctly
        # Confirm the tap cask has the right version + SHA256 after the push.
        # Catches: sed substitution failure, push failure, token expiry.
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          if [[ -z "$GH_TOKEN" ]]; then
            echo "HOMEBREW_TAP_TOKEN not set — skipping tap verification"
            exit 0
          fi
          VERSION="${{ steps.version.outputs.VERSION }}"
          SHA256=$(shasum -a 256 "$ARTIFACT" | awk '{print $1}')
          # Re-fetch the cask from GitHub to confirm the push landed
          CASK=$(curl -fsSL \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            "https://raw.githubusercontent.com/paulhkang94/homebrew-markview/main/Casks/markview.rb" \
            2>/dev/null)
          TAP_VER=$(echo "$CASK" | grep -oE 'version "[0-9]+\.[0-9]+\.[0-9]+"' | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' || echo "")
          TAP_SHA=$(echo "$CASK" | grep -oE 'sha256 "[a-f0-9]+"' | grep -oE '[a-f0-9]+' || echo "")
          if [[ "$TAP_VER" == "$VERSION" ]]; then
            echo "✓ Homebrew tap version: ${TAP_VER}"
          else
            echo "ERROR: Homebrew tap version is '${TAP_VER}' (expected '${VERSION}')"
            exit 1
          fi
          if [[ "$TAP_SHA" == "$SHA256" ]]; then
            echo "✓ Homebrew tap SHA256 matches"
          else
            echo "ERROR: Homebrew tap SHA256 mismatch"
            echo "  tap:      ${TAP_SHA}"
            echo "  expected: ${SHA256}"
            exit 1
          fi

