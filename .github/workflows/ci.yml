name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

# Cancel in-progress runs for the same branch/PR to save runner minutes
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Test
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      # Pin Xcode to prevent silent toolchain changes when GitHub updates the runner image.
      # Update this intentionally (test locally first) rather than having it drift.
      - name: Pin Xcode version
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16'

      - name: Swift version
        run: swift --version

      # Cache SPM dependencies for faster builds
      - name: Cache SPM dependencies
        uses: actions/cache@v4
        with:
          path: |
            .build
            ~/.cache/org.swift.swiftpm
          key: spm-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('Package.swift', 'Package.resolved') }}
          restore-keys: |
            spm-${{ runner.os }}-${{ runner.arch }}-

      - name: Build (debug)
        run: swift build

      - name: Build (release)
        run: swift build -c release

      - name: Run tests
        run: |
          OUTPUT=$(swift run MarkViewTestRunner 2>&1)
          echo "$OUTPUT"
          RESULT=$(echo "$OUTPUT" | grep "Results:")
          echo ""
          echo "Test result line: $RESULT"
          if echo "$RESULT" | grep -q "0 failed"; then
            echo "All tests passed."
          else
            echo "::error::Tests failed: $RESULT"
            exit 1
          fi

  verify:
    name: Verify
    runs-on: macos-15
    needs: build
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full clone — verify.sh checks git tag existence for BINARY_VERSION sync.
          # fetch-tags:true is insufficient with shallow clones; fetch-depth:0 is the correct fix.

      - name: Cache SPM dependencies
        uses: actions/cache@v4
        with:
          path: |
            .build
            ~/.cache/org.swift.swiftpm
          key: spm-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('Package.swift', 'Package.resolved') }}
          restore-keys: |
            spm-${{ runner.os }}-${{ runner.arch }}-

      - name: Run verify.sh
        run: bash verify.sh

  bundle:
    name: Bundle
    runs-on: macos-15
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Cache SPM dependencies
        uses: actions/cache@v4
        with:
          path: |
            .build
            ~/.cache/org.swift.swiftpm
          key: spm-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('Package.swift', 'Package.resolved') }}
          restore-keys: |
            spm-${{ runner.os }}-${{ runner.arch }}-

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build and install .app bundle
        run: bash scripts/bundle.sh --install

      - name: Verify signing
        run: bash scripts/verify-signing.sh /Applications/MarkView.app

      - name: Test distribution (local install path)
        run: bash scripts/test-distribution.sh --local

  mcp:
    name: MCP Tests
    runs-on: macos-15
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Cache SPM dependencies
        uses: actions/cache@v4
        with:
          path: |
            .build
            ~/.cache/org.swift.swiftpm
          key: spm-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('Package.swift', 'Package.resolved') }}
          restore-keys: |
            spm-${{ runner.os }}-${{ runner.arch }}-

      - name: Run MCP protocol tests
        run: bash scripts/test-mcp.sh --skip-e2e

  golden-check:
    name: Golden Drift Check
    runs-on: macos-15
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Cache SPM dependencies
        uses: actions/cache@v4
        with:
          path: |
            .build
            ~/.cache/org.swift.swiftpm
          key: spm-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('Package.swift', 'Package.resolved') }}
          restore-keys: |
            spm-${{ runner.os }}-${{ runner.arch }}-

      - name: Regenerate goldens
        run: swift run MarkViewTestRunner --generate-goldens

      - name: Check for golden drift
        run: |
          if ! git diff --quiet Tests/TestRunner/Fixtures/expected/; then
            echo "::error::Golden baselines are stale. Regenerate and commit:"
            git diff --stat Tests/TestRunner/Fixtures/expected/
            exit 1
          fi
          echo "Golden baselines are up to date."

  visual-smoke:
    name: Visual Smoke Tests
    runs-on: macos-15
    needs: build
    continue-on-error: true  # WKWebView navigation times out on headless CI runners; not a required gate
    steps:
      - uses: actions/checkout@v4

      - name: Cache SPM dependencies
        uses: actions/cache@v4
        with:
          path: |
            .build
            ~/.cache/org.swift.swiftpm
          key: spm-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('Package.swift', 'Package.resolved') }}
          restore-keys: |
            spm-${{ runner.os }}-${{ runner.arch }}-

      - name: Run visual smoke tests (non-blank render gate)
        run: |
          OUTPUT=$(swift run MarkViewVisualTester --smoke 2>&1) || true
          echo "$OUTPUT"
          if echo "$OUTPUT" | grep -q " 0 failed"; then
            echo "Visual smoke tests passed."
          else
            # WKWebView requires a display; CI macOS runners may time out on navigation.
            # This is advisory only — the required gates are Build & Test + Golden Drift Check.
            echo "::warning::Visual smoke tests did not pass — WKWebView may need a display context in CI. Not blocking."
          fi

  docs-audit:
    name: Public Docs Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify no private docs in public repo
        run: |
          # Approved docs/research/ files — update when adding new public technical docs.
          # Do NOT add strategy, adoption, competitive, financial, or personal docs here.
          APPROVED=(
            "docs/research/e2e-perf-testing-approaches.md"
            "docs/research/editor-bug-analysis.md"
            "docs/research/ql-webview-sandbox-analysis.md"
            "docs/research/quicklook-extension-spm.md"
          )
          PRIVATE_SIGNALS="strategy|competitive|adoption|financial|revenue|investor|confidential|internal|personal|launch|market|positioning|audit|metrics|roadmap|pricing"

          failed=0

          # Check for unapproved docs/research/ files
          while IFS= read -r f; do
            [[ -z "$f" ]] && continue
            approved=false
            for a in "${APPROVED[@]}"; do [[ "$f" == "$a" ]] && approved=true && break; done
            if [[ "$approved" == "false" ]]; then
              echo "::error file=$f::Unapproved docs/research/ file in public repo. Run: git rm --cached $f"
              failed=1
            fi
          done < <(git ls-files docs/research/ 2>/dev/null || true)

          # Check for private-signal filenames anywhere in tracked docs/
          while IFS= read -r f; do
            [[ -z "$f" ]] && continue
            base=$(basename "$f" .md)
            if echo "$base" | grep -qiE "$PRIVATE_SIGNALS"; then
              echo "::error file=$f::Private-signal filename in public docs. Run: git rm --cached $f"
              failed=1
            fi
          done < <(git ls-files docs/ 2>/dev/null || true)

          if [[ $failed -eq 1 ]]; then
            echo ""
            echo "Private or unapproved docs detected. See errors above."
            exit 1
          fi
          echo "Docs audit passed."

  sentry-release:
    name: Sentry Release
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create Sentry release
        uses: getsentry/action-release@v3
        continue-on-error: true
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: paulkang
          SENTRY_PROJECT: apple-macos
        with:
          environment: production
          release: ${{ github.sha }}
